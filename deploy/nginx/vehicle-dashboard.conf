# ==========================================================================
# Vehicle Zone Intelligence — Nginx reverse proxy (LAN-facing front door)
# ==========================================================================
#
# This is the ONLY service that should face the LAN for the dashboard. It
# terminates HTTPS on 443 and forwards to the FastAPI app, which is bound to
# 127.0.0.1:8002 (loopback) and is NOT directly reachable from the network.
#
# What this file gives you (maps to the security observations):
#   - #2  Nginx is the single LAN-facing web entry point over HTTPS/443.
#   - #7  TLS hardening, security headers, request-size limit, access logs.
#         (Source-IP allowlist is intentionally DISABLED — see below.)
#
# ---- This file is pre-configured for the production deployment ----
#   server name : ramp-congestion.ghialunifiedapps.in   (server 172.27.6.226)
#   cert        : /etc/ssl/certs/ramp-congestion.ghialunifiedapps.in.fullchain.pem
#   key         : /etc/ssl/private/ramp-congestion.ghialunifiedapps.in.key
#   allowlist   : DISABLED (viewer access open to all source IPs; internal
#                 network only). Admin stays localhost-only via the app layer.
# The cert is a GoDaddy wildcard (*.ghialunifiedapps.in); the fullchain must
# include the gd_bundle-g2 intermediate (see deploy/SECURITY_RUNBOOK.md).
#
# ---- Install (Debian/Ubuntu) ----
#   # First place the cert/key on the host (see SECURITY_RUNBOOK.md "TLS"):
#   #   /etc/ssl/certs/ramp-congestion.ghialunifiedapps.in.fullchain.pem  (0644 root)
#   #   /etc/ssl/private/ramp-congestion.ghialunifiedapps.in.key          (0640 root)
#   sudo cp deploy/nginx/vehicle-dashboard.conf \
#           /etc/nginx/sites-available/vehicle-dashboard.conf
#   sudo ln -s /etc/nginx/sites-available/vehicle-dashboard.conf \
#              /etc/nginx/sites-enabled/vehicle-dashboard.conf
#   sudo rm -f /etc/nginx/sites-enabled/default      # drop the default vhost
#   sudo nginx -t                                     # validate config
#   sudo systemctl reload nginx
# ==========================================================================

# Rate-limit zone for the login/API surface. Tune as needed; this caps a
# single client to ~20 req/s with a small burst, blunting scraping/brute force.
limit_req_zone $binary_remote_addr zone=vzi_api:10m rate=20r/s;

# --- Redirect all plain HTTP to HTTPS -------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name ramp-congestion.ghialunifiedapps.in;
    return 301 https://$host$request_uri;
}

# --- Main HTTPS server ----------------------------------------------------
server {
    # http2 on the listen line (legacy form) for compatibility with nginx
    # < 1.25.1, which does not support the standalone `http2 on;` directive.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ramp-congestion.ghialunifiedapps.in;

    # ---- TLS (observation #7) --------------------------------------------
    ssl_certificate     /etc/ssl/certs/ramp-congestion.ghialunifiedapps.in.fullchain.pem;
    ssl_certificate_key /etc/ssl/private/ramp-congestion.ghialunifiedapps.in.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ---- Source-IP restriction (DISABLED) --------------------------------
    # Viewer access is intentionally open to all source IPs (internal network
    # only — the host is not internet-exposed). Admin actions remain restricted
    # to the server console (localhost) by the app layer (cloud/modules/auth.py),
    # independent of this allowlist, so opening this perimeter grants viewer
    # access only — it cannot grant admin to any LAN client.
    # To re-introduce a perimeter allowlist, uncomment and adjust:
    #   allow 172.27.0.0/16;      # operator network (server is 172.27.6.226)
    #   deny  all;

    # ---- Security headers (observation #7) -------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "no-referrer" always;
    # Dashboard is a self-contained static page + same-origin API/WS. If you
    # later load assets/fonts from a CDN, widen this CSP accordingly.
    add_header Content-Security-Policy    "default-src 'self'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' ws: wss:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'" always;

    # ---- Request limits (observation #7) ---------------------------------
    client_max_body_size 10m;          # cap upload/body size
    client_body_timeout  30s;
    client_header_timeout 30s;

    # ---- Dedicated access/error logs (observation #7) --------------------
    access_log /var/log/nginx/vehicle-dashboard.access.log;
    error_log  /var/log/nginx/vehicle-dashboard.error.log warn;

    # ---- Upstream: the FastAPI app on loopback ---------------------------
    # WebSocket endpoint for live dashboard updates.
    location /ws/dashboard {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;      # long-lived socket
        proxy_send_timeout 3600s;
    }

    # Everything else (dashboard HTML, /api, /static, /health).
    location / {
        limit_req zone=vzi_api burst=40 nodelay;
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
