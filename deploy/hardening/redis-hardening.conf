# ==========================================================================
# Redis hardening drop-in (security observations #3 and #9)
# ==========================================================================
# #9 is primarily a VERSION upgrade (Redis 5.x is end-of-life and unpatched —
# see deploy/SECURITY_RUNBOOK.md for the apt upgrade steps). This file is the
# accompanying configuration hardening.
#
# Apply by appending these directives to /etc/redis/redis.conf (or placing
# this file where your packaging includes conf.d), then:
#   sudo systemctl restart redis-server
#   redis-cli -p 6379 ping        # should reply PONG (locally)
#
# Bind to loopback only — the app and edge run on the same host and reach
# Redis via localhost. This removes Redis from the LAN entirely (#3).
bind 127.0.0.1 -::1
protected-mode yes
port 6379

# Strongly recommended: require a password (defence in depth on top of the
# loopback bind). If you ENABLE this, you MUST also tell the app the password
# by setting in deploy/.env:
#     VZI_REDIS_URL=redis://:CHANGE_ME_strong_redis_password@localhost:6379/1
# requirepass CHANGE_ME_strong_redis_password

# Optional: neuter the most dangerous admin commands.
# rename-command FLUSHALL ""
# rename-command FLUSHDB ""
# rename-command CONFIG ""
