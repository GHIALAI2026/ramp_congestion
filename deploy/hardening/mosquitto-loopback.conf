# ==========================================================================
# Mosquitto MQTT loopback-only drop-in (security observation #3)
# ==========================================================================
# Install into the conf.d directory so it overrides the default all-interfaces
# listener, then restart:
#   sudo cp deploy/hardening/mosquitto-loopback.conf \
#           /etc/mosquitto/conf.d/local-only.conf
#   sudo systemctl restart mosquitto
#   # confirm it is loopback-only:
#   sudo ss -tlnp '( sport = :1883 )'
#
# Defining an explicit listener disables Mosquitto's default 0.0.0.0 listener,
# so the broker stops facing the LAN. The cloud consumer and edge publisher
# connect via localhost:1883 on the same host, so loopback is sufficient.
listener 1883 127.0.0.1

# Anonymous is acceptable here ONLY because the listener is loopback-only and
# the host firewall blocks 1883 from the LAN. If you later expose MQTT beyond
# loopback (e.g. a remote edge over the network), switch to authenticated
# access (password_file / TLS) and add the credentials to the app config.
allow_anonymous true
